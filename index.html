<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zähler 1 bis 3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a1a; color: #fff; display: flex; justify-content: center; align-items: flex-end; min-height: 100vh; min-height: 100dvh; overflow: hidden; touch-action: manipulation; }
  #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .wrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 1rem 8px 2rem; gap: 1rem; width: 100%; max-width: 480px; }
  .number { font-size: clamp(72px, 20vw, 120px); font-weight: 600; line-height: 1; min-height: 1.2em; display: flex; align-items: center; justify-content: center; transition: color 0.3s; text-shadow: 0 0 30px rgba(255,255,255,0.2); }
  .dots { display: flex; gap: 14px; justify-content: center; }
  .dot { width: clamp(22px, 6vw, 34px); height: clamp(22px, 6vw, 34px); border-radius: 50%; background: #333; transition: background 0.2s; }
  .dot.active { background: #5DCAA5; box-shadow: 0 0 10px #5DCAA5; }
  .controls { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; width: 100%; padding: 0 4px; }
  button {
    font-size: 12px;
    padding: 9px 10px;
    cursor: pointer;
    border: 1.5px solid #555;
    border-radius: 10px;
    background: rgba(255,255,255,0.07);
    color: #fff;
    min-height: 44px;
    flex: 1 1 0;
    min-width: 0;
    max-width: 120px;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  button:active { background: rgba(255,255,255,0.18); transform: scale(0.95); }
  .row-nav { gap: 8px; }
  .row-nav button { font-size: 20px; max-width: 80px; }
  .row-nav #color-btn { font-size: 12px; max-width: 110px; }
  .row-speed button { font-size: 11px; }
  .row-extra button { max-width: 180px; font-size: 12px; }
  #spd-1 { border-color: #5DCAA5; color: #5DCAA5; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="wrap">
  <div class="number" id="num">1</div>
  <div class="dots" id="dots"></div>
  <div class="controls row-nav">
    <button onclick="step(-1)">&#8592;</button>
    <button id="color-btn" onclick="toggleColor()">🎨 Bunt</button>
    <button onclick="step(1)">&#8594;</button>
  </div>
  <div class="controls row-speed">
    <button id="spd-1" onclick="setSpeed(1)">🐢 Langsam</button>
    <button id="spd-2" onclick="setSpeed(2)">🦅 Schnell</button>
    <button id="spd-3" onclick="setSpeed(3)">⚡ Turbo</button>
  </div>
  <div class="controls row-extra">
    <button id="chirp-btn" onclick="toggleChirp()">🔊 Zwitschern</button>
  </div>
</div>
<script>
/* ── Counter (1–3) ── */
let current = 1;
const numEl = document.getElementById('num');
const dotsEl = document.getElementById('dots');
for (let i = 1; i <= 3; i++) {
  const d = document.createElement('div');
  d.className = 'dot'; d.id = 'dot' + i;
  dotsEl.appendChild(d);
}
function render() {
  numEl.textContent = current;
  numEl.style.color = current === 3 ? '#f4a261' : '#fff';
  for (let i = 1; i <= 3; i++)
    document.getElementById('dot'+i).classList.toggle('active', i <= current);
}
function step(dir) {
  current += dir;
  if (current > 3) current = 1;
  if (current < 1) current = 3;
  render();
}
let colorful = false;
function toggleColor() {
  colorful = !colorful;
  const btn = document.getElementById('color-btn');
  btn.style.borderColor = colorful ? '#f4a261' : '';
  btn.style.color = colorful ? '#f4a261' : '';
  btn.textContent = colorful ? '🎨 Normal' : '🎨 Bunt';
}
render();

let speedMult = 1;
let chirpEnabled = true;
function toggleChirp() {
  chirpEnabled = !chirpEnabled;
  const btn = document.getElementById('chirp-btn');
  btn.textContent = chirpEnabled ? '🔊 Zwitschern' : '🔇 Zwitschern';
  btn.style.borderColor = chirpEnabled ? '' : '#888';
  btn.style.color = chirpEnabled ? '' : '#888';
  // stop Hawaii immediately if turning off while drunk
  if (!chirpEnabled) stopHawaii();
}
function setSpeed(lvl) {
  speedMult = lvl === 1 ? 1 : lvl === 2 ? 2.2 : 4;
  ['spd-1','spd-2','spd-3'].forEach((id,i) => {
    const el = document.getElementById(id);
    el.style.borderColor = (i+1 === lvl) ? '#5DCAA5' : '';
    el.style.color = (i+1 === lvl) ? '#5DCAA5' : '';
  });
}

/* ── Canvas ── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ── Audio ── */
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Chirp: short sweet bird tweet
let chirpTimer = 0;
const CHIRP_INTERVAL = 1200;
function playChirp() {
  try {
    const ac = getAudio();
    const t = ac.currentTime;
    // Two-note tweet: high then slightly lower
    const notes = [
      { freq: 2800, start: 0,    dur: 0.06 },
      { freq: 3200, start: 0.07, dur: 0.05 },
      { freq: 2600, start: 0.13, dur: 0.08 },
    ];
    notes.forEach(n => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(n.freq, t + n.start);
      osc.frequency.exponentialRampToValueAtTime(n.freq * 1.15, t + n.start + n.dur * 0.4);
      osc.frequency.exponentialRampToValueAtTime(n.freq * 0.85, t + n.start + n.dur);
      gain.gain.setValueAtTime(0, t + n.start);
      gain.gain.linearRampToValueAtTime(0.13, t + n.start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + n.start + n.dur);
      osc.start(t + n.start);
      osc.stop(t + n.start + n.dur + 0.01);
    });
  } catch(e) {}
}

// "Es gibt kein Bier auf Hawaii" — melody notes (simplified)
// C D E G A pattern loosely matching the tune
// "Trink Brüderchen trink" - kurze Version
const HAWAII_NOTES = [
  392.0, 392.0, 440.0, 392.0, 349.2, 392.0,
  440.0, 440.0, 392.0, 349.2, 261.6
];
let hawaiiNode = null;
let hawaiiPlaying = false;
function startHawaii() {
  if (hawaiiPlaying) return;
  hawaiiPlaying = true;
  try {
    const ac = getAudio();
    let t = ac.currentTime + 0.05;
    const noteDur = 0.22;
    HAWAII_NOTES.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      // slight vibrato via second osc
      const vib = ac.createOscillator();
      const vibGain = ac.createGain();
      vib.frequency.value = 5;
      vibGain.gain.value = 8;
      vib.connect(vibGain); vibGain.connect(osc.frequency);
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.04);
      gain.gain.setValueAtTime(0.18, t + noteDur - 0.06);
      gain.gain.linearRampToValueAtTime(0, t + noteDur);
      vib.start(t); vib.stop(t + noteDur);
      osc.start(t); osc.stop(t + noteDur);
      t += noteDur;
    });
    // loop: schedule restart after melody ends
    const totalDur = HAWAII_NOTES.length * noteDur * 1000;
    hawaiiNode = setTimeout(() => { hawaiiPlaying = false; if (birdIsDrunk()) startHawaii(); }, totalDur + 200);
  } catch(e) { hawaiiPlaying = false; }
}
function stopHawaii() {
  hawaiiPlaying = false;
  if (hawaiiNode) { clearTimeout(hawaiiNode); hawaiiNode = null; }
}
function birdIsDrunk() { return bird.state === S_DRUNK; }

/* ── Draw Kingfisher ── */
function drawBird(cx, cy, wingPhase, drinkTilt, drunkTilt, drunkWobble, isColorful) {
  ctx.save();
  ctx.translate(cx, cy);
  if (drinkTilt !== 0) ctx.rotate(drinkTilt * 0.35);
  if (drunkTilt !== 0) ctx.rotate(drunkTilt);
  const bs = (typeof birdScale === "function" ? birdScale() : 1) * 0.95; ctx.scale(bs, bs);

  const wBeat = Math.sin(wingPhase * Math.PI * 2);
  const wY = wBeat * 30;

  // tail
  ctx.beginPath();
  ctx.moveTo(-80, 0); ctx.lineTo(-115, -12+wBeat*4); ctx.lineTo(-105, 2); ctx.lineTo(-115, 14-wBeat*4); ctx.closePath();
  let g = ctx.createLinearGradient(-115,0,-80,0);
  if (isColorful) {
    g.addColorStop(0,'#cc00ff'); g.addColorStop(1,'#ff6600');
  } else {
    g.addColorStop(0,'#023e8a'); g.addColorStop(1,'#0077b6');
  }
  ctx.fillStyle = g; ctx.fill();

  // upper wing
  ctx.beginPath();
  ctx.moveTo(-20,-8);
  ctx.bezierCurveTo(-10,-30-wY*0.6, 30,-55-wY, 70,-42-wY);
  ctx.bezierCurveTo(50,-28-wY*0.5, 10,-10, -15,2);
  ctx.closePath();
  g = ctx.createLinearGradient(0,-55,70,-20);
  if (isColorful) {
    g.addColorStop(0,'#ff66ff'); g.addColorStop(0.4,'#ffaa00'); g.addColorStop(1,'#00ccff');
  } else {
    g.addColorStop(0,'#48cae4'); g.addColorStop(0.4,'#0096c7'); g.addColorStop(1,'#023e8a');
  }
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle='rgba(0,180,230,0.35)'; ctx.lineWidth=0.8;
  for(let i=0;i<5;i++){const t=0.2+i*0.15;ctx.beginPath();ctx.moveTo(-20+t*35,-8-t*18);ctx.lineTo(-20+t*90,-8-t*(47+wY)+(1-t)*10);ctx.stroke();}

  // lower wing
  ctx.beginPath();
  ctx.moveTo(-15,6);
  ctx.bezierCurveTo(0,20+wY*0.3, 40,35+wY*0.5, 65,28+wY*0.4);
  ctx.bezierCurveTo(45,18, 10,8, -10,4); ctx.closePath();
  g = ctx.createLinearGradient(0,35,65,10);
  if (isColorful) {
    g.addColorStop(0,'#aaff00'); g.addColorStop(1,'#00ccff');
  } else {
    g.addColorStop(0,'#90e0ef'); g.addColorStop(1,'#0077b6');
  }
  ctx.fillStyle=g; ctx.globalAlpha=0.6; ctx.fill(); ctx.globalAlpha=1;

  // body back
  g = ctx.createLinearGradient(-60,-18,60,18);
  if (isColorful) {
    g.addColorStop(0,'#ff00cc'); g.addColorStop(0.3,'#ff6600'); g.addColorStop(0.6,'#00ff88'); g.addColorStop(1,'#0066ff');
  } else {
    g.addColorStop(0,'#00b4d8'); g.addColorStop(0.35,'#0077b6'); g.addColorStop(1,'#023e8a');
  }
  ctx.beginPath(); ctx.ellipse(0,-4,75,18,0,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  g=ctx.createLinearGradient(-50,-20,50,10);
  g.addColorStop(0,'rgba(180,255,255,0)'); g.addColorStop(0.45,'rgba(180,255,255,0.18)'); g.addColorStop(0.55,'rgba(255,255,255,0.1)'); g.addColorStop(1,'rgba(180,255,255,0)');
  ctx.beginPath(); ctx.ellipse(0,-4,75,18,0,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();

  // belly
  g=ctx.createLinearGradient(0,0,0,26);
  g.addColorStop(0,'#f4a261'); g.addColorStop(0.6,'#e76f51'); g.addColorStop(1,'#c1440e');
  ctx.beginPath(); ctx.ellipse(5,10,55,14,0.1,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,6,30,6,0,0,Math.PI*2); ctx.fillStyle='rgba(255,210,160,0.2)'; ctx.fill();

  // head
  g=ctx.createRadialGradient(58,-12,2,58,-8,22);
  if (isColorful) {
    g.addColorStop(0,'#ff44aa'); g.addColorStop(0.5,'#cc00ff'); g.addColorStop(1,'#6600cc');
  } else {
    g.addColorStop(0,'#00b4d8'); g.addColorStop(0.5,'#0077b6'); g.addColorStop(1,'#023e8a');
  }
  ctx.beginPath(); ctx.ellipse(60,-8,22,20,-0.1,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.moveTo(40,-14); ctx.bezierCurveTo(48,-32,72,-30,80,-16); ctx.bezierCurveTo(72,-22,52,-24,40,-14);
  ctx.fillStyle=isColorful?'#330066':'#03045e'; ctx.globalAlpha=0.85; ctx.fill(); ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(100,210,240,0.5)'; ctx.lineWidth=0.7;
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(44+i*8,-14);ctx.lineTo(46+i*7,-26);ctx.stroke();}
  ctx.beginPath(); ctx.ellipse(72,2,9,6,0.4,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(62,4,10,4,-0.2,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fill();

  // eye — drunk: X-eyes when drunkWobble active
  ctx.beginPath(); ctx.arc(68,-10,7,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  if (drunkWobble > 0.1) {
    // X-eye
    ctx.save(); ctx.translate(68,-10);
    ctx.strokeStyle='#c1440e'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-4,-4); ctx.lineTo(4,4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4,-4); ctx.lineTo(-4,4); ctx.stroke();
    ctx.restore();
    // rosy cheeks
    ctx.beginPath(); ctx.arc(62,-2,6,0,Math.PI*2);
    ctx.fillStyle='rgba(220,80,80,0.35)'; ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(68,-10,5.5,0,Math.PI*2); ctx.fillStyle='#4a0e0e'; ctx.fill();
    ctx.beginPath(); ctx.arc(68,-10,3.5,0,Math.PI*2); ctx.fillStyle='#050505'; ctx.fill();
    ctx.beginPath(); ctx.arc(70,-12,1.5,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill();
  }

  // beak
  ctx.beginPath(); ctx.moveTo(80,-10); ctx.lineTo(130,-5); ctx.lineTo(80,-4); ctx.closePath();
  g=ctx.createLinearGradient(80,-10,130,-5); g.addColorStop(0,'#111'); g.addColorStop(1,'#2a2a2a');
  ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.moveTo(80,-3); ctx.lineTo(130,-4); ctx.lineTo(80,2); ctx.closePath(); ctx.fillStyle='#1a1a1a'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(81,-9); ctx.lineTo(128,-5); ctx.strokeStyle='rgba(80,80,80,0.7)'; ctx.lineWidth=0.8; ctx.stroke();

  // feet
  ctx.strokeStyle='#c1440e'; ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(10,16);ctx.lineTo(8,26);ctx.moveTo(8,26);ctx.lineTo(4,30);ctx.moveTo(8,26);ctx.lineTo(10,31);ctx.moveTo(8,26);ctx.lineTo(13,29);
  ctx.moveTo(20,17);ctx.lineTo(19,27);ctx.moveTo(19,27);ctx.lineTo(15,31);ctx.moveTo(19,27);ctx.lineTo(21,32);ctx.moveTo(19,27);ctx.lineTo(24,30);
  ctx.stroke();

  ctx.restore();
}

/* ── Draw Beer Glass ── */
function drawBeerGlass(x, y, fillLevel, rotation) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  const w = 38, h = 60, base = 28;
  if (fillLevel > 0.7) {
    ctx.beginPath(); ctx.arc(0, -h*0.5-6, 7, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
    ctx.beginPath(); ctx.arc(6, -h*0.5-4, 5, 0, Math.PI*2); ctx.fill();
  }
  ctx.beginPath();
  ctx.moveTo(-base/2, h/2); ctx.lineTo(-w/2, -h/2); ctx.lineTo(w/2, -h/2); ctx.lineTo(base/2, h/2);
  ctx.closePath();
  ctx.fillStyle='rgba(180,230,255,0.18)'; ctx.fill();
  ctx.strokeStyle='rgba(180,230,255,0.7)'; ctx.lineWidth=2; ctx.stroke();
  const beerTop = h/2 - h * fillLevel;
  ctx.beginPath();
  ctx.moveTo(-base/2 + (base-w)/2 * (1-fillLevel), beerTop);
  ctx.lineTo(w/2 - (w-base)/2 * fillLevel, beerTop);
  ctx.lineTo(base/2, h/2); ctx.lineTo(-base/2, h/2); ctx.closePath();
  const beer = ctx.createLinearGradient(0, beerTop, 0, h/2);
  beer.addColorStop(0,'rgba(240,180,20,0.85)'); beer.addColorStop(1,'rgba(180,100,5,0.9)');
  ctx.fillStyle=beer; ctx.fill();
  ctx.beginPath();
  for(let i=0;i<5;i++) ctx.arc(-w/2+5+i*8, beerTop, 5, Math.PI, 0);
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fill();
  ctx.beginPath();
  ctx.arc(w/2+8, 0, 14, -Math.PI*0.5, Math.PI*0.5);
  ctx.strokeStyle='rgba(180,230,255,0.65)'; ctx.lineWidth=5; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-w/2+4, -h/2+6); ctx.lineTo(-w/2+8, h/2-8);
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
  ctx.restore();
}

/* ── Stars/bubbles for drunk effect ── */
let drunkStars = [];
const drunkSymbols = ['★','★','💫','🍺','⭐','✦'];
function spawnDrunkStars(x, y) {
  for(let i=0;i<8;i++){
    const angle = Math.random()*Math.PI*2;
    drunkStars.push({ x, y, angle, dist:0, life:1, speed:2+Math.random()*3,
      sym: drunkSymbols[Math.floor(Math.random()*drunkSymbols.length)],
      size: 18+Math.floor(Math.random()*16) });
  }
}
function updateDrunkStars(dt) {
  drunkStars = drunkStars.filter(s=>s.life>0);
  for(const s of drunkStars){
    s.dist += s.speed*(dt/16);
    s.angle += 0.03*(dt/16);
    s.life -= 0.012*(dt/16);
    const sx = s.x + Math.cos(s.angle)*s.dist;
    const sy = s.y + Math.sin(s.angle)*s.dist - s.dist*0.5;
    ctx.save();
    ctx.globalAlpha = s.life;
    ctx.font = s.size+'px sans-serif';
    ctx.fillStyle = '#f4e04a';
    ctx.fillText(s.sym, sx, sy);
    ctx.restore();
  }
}

/* ── Splash particles ── */
let splashParticles = [];
function updateSplash(dt) {
  splashParticles = splashParticles.filter(p=>p.life>0);
  for(const p of splashParticles){
    p.x += p.vx*(dt/16); p.y += p.vy*(dt/16); p.vy += 0.3; p.life -= 0.03;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = p.color + p.life + ')'; ctx.fill();
  }
}

/* ── States ── */
const S_FLY=0, S_DRINK_APPEAR=1, S_DRINKING=2, S_THROW=3, S_DRUNK=4, S_LOOP=5, S_RECOVER=6;

const bird = {
  x:-150, y:200, speed:4.5, phase:0, bobTime:0,
  state: S_FLY, stateTimer:0,
  drinkTilt:0,
  drunkWobble:0, drunkAngle:0,
  loopAngle:0, loopCx:0, loopCy:0,
  glass:{ x:0,y:0,vx:0,vy:0,rot:0,vrot:0,fill:0.85,visible:false }
};

function birdScale() { return Math.min(1, canvas.width / 500); }
function resetBird() {
  bird.x = -150;
  bird.y = canvas.height*(0.15+Math.random()*0.55);
  bird.speed = 3.8+Math.random()*1.5;
  bird.phase = Math.random();
  bird.state = S_FLY;
  bird.stateTimer = 0;
  bird.drinkTilt = 0;
  bird.drunkWobble = 0;
  bird.drunkAngle = 0;
  bird.glass.visible = false;
}
resetBird();

let lastTs=0;
function animate(ts) {
  const dt = Math.min(ts-lastTs,40); lastTs=ts;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const midX = canvas.width*0.5;
  bird.stateTimer += dt;

  if (bird.state === S_FLY) {
    bird.x += bird.speed*speedMult*(dt/16);
    bird.phase += dt*0.006;
    bird.bobTime += dt*0.002;
    chirpTimer += dt;
    if (chirpTimer > CHIRP_INTERVAL) { chirpTimer = 0; if (chirpEnabled) playChirp(); }
    if (bird.x > midX-30 && bird.x < midX+30) {
      bird.state = S_DRINK_APPEAR;
      bird.stateTimer = 0;
      bird.glass = { x:bird.x+160, y:bird.y-20, vx:0,vy:0, rot:0,vrot:0, fill:0.85, visible:true };
    }
    if (bird.x > canvas.width+200) { step(1); resetBird(); }
  }
  else if (bird.state === S_DRINK_APPEAR) {
    const t = Math.min(bird.stateTimer/400,1);
    bird.glass.x = (bird.x+160) - t*70;
    bird.glass.y = bird.y-20;
    if (t>=1) { bird.state=S_DRINKING; bird.stateTimer=0; }
  }
  else if (bird.state === S_DRINKING) {
    const t = Math.min(bird.stateTimer/1200,1);
    bird.drinkTilt = Math.sin(t*Math.PI)*0.5;
    bird.glass.rot = -Math.sin(t*Math.PI)*0.4;
    bird.glass.x = bird.x+90;
    bird.glass.y = bird.y-20-Math.sin(t*Math.PI)*12;
    bird.glass.fill = 0.85-t*0.45;
    if (t>=1) {
      bird.glass.vx = 8+Math.random()*4;
      bird.glass.vy = -7-Math.random()*3;
      bird.glass.vrot = 0.2+Math.random()*0.15;
      bird.drinkTilt = 0;
      if (current === 3) {
        bird.state = S_DRUNK;
        bird.stateTimer = 0;
        bird.drunkWobble = 1.0;
        spawnDrunkStars(bird.x, bird.y-30);
        chirpTimer = 0;
        if (chirpEnabled) startHawaii();
      } else {
        bird.state = S_THROW;
        bird.stateTimer = 0;
      }
    }
  }
  else if (bird.state === S_THROW) {
    bird.x += bird.speed*speedMult*(dt/16);
    bird.phase += dt*0.006;
    bird.bobTime += dt*0.002;
    chirpTimer += dt;
    if (chirpTimer > CHIRP_INTERVAL) { chirpTimer = 0; if (chirpEnabled) playChirp(); }
    bird.glass.vy += 0.35*(dt/16);
    bird.glass.x += bird.glass.vx*(dt/16);
    bird.glass.y += bird.glass.vy*(dt/16);
    bird.glass.rot += bird.glass.vrot*(dt/16);
    if (bird.glass.y > canvas.height+120) bird.glass.visible = false;
    if (bird.x > canvas.width+200) { step(1); resetBird(); }
  }
  else if (bird.state === S_DRUNK) {
    const t = bird.stateTimer/2600;
    // Wild erratic wobble: fast oscillation + slow drift
    bird.drunkAngle = Math.sin(t*Math.PI*10)*0.75 + Math.sin(t*Math.PI*3)*0.3;
    // stagger up/down and sideways
    bird.y += Math.sin(bird.stateTimer*0.008)*1.2*(dt/16);
    bird.x += Math.sin(bird.stateTimer*0.004)*0.8*(dt/16);
    bird.phase += dt*0.012; // flap wildly
    bird.bobTime += dt*0.008;
    // keep spawning stars continuously
    if (bird.stateTimer % 180 < dt) spawnDrunkStars(bird.x, bird.y-30);
    // throw glass too
    bird.glass.vy += 0.35*(dt/16);
    bird.glass.x += bird.glass.vx*(dt/16);
    bird.glass.y += bird.glass.vy*(dt/16);
    bird.glass.rot += bird.glass.vrot*(dt/16);
    if (bird.glass.y > canvas.height+120) bird.glass.visible = false;
    if (bird.stateTimer > 2600) {
      // start loop
      bird.state = S_LOOP;
      bird.stateTimer = 0;
      bird.drunkAngle = 0;
      stopHawaii();
      const loopR = 140;
      bird.loopCx = bird.x;
      bird.loopCy = bird.y - loopR;
      bird.loopAngle = Math.PI/2; // start at bottom of circle
    }
  }
  else if (bird.state === S_LOOP) {
    // Full loop: bird orbits around loopCx/loopCy
    const loopR = 140;
    const loopSpeed = 0.003;
    bird.loopAngle -= loopSpeed*dt; // counter-clockwise (upward first)
    bird.x = bird.loopCx + Math.cos(bird.loopAngle)*loopR;
    bird.y = bird.loopCy + Math.sin(bird.loopAngle)*loopR;
    bird.phase += dt*0.008;
    bird.drunkWobble = 0.5;
    if (bird.stateTimer > 2200) {
      // loop done
      bird.state = S_RECOVER;
      bird.stateTimer = 0;
      bird.drunkWobble = 0;
      bird.drunkAngle = 0;
      bird.loopCx += 60; // nudge forward after loop
      bird.x = bird.loopCx;
    }
  }
  else if (bird.state === S_RECOVER) {
    // short wobble then fly normally
    const t = Math.min(bird.stateTimer/600,1);
    bird.drunkWobble = (1-t)*0.4;
    bird.drunkAngle = Math.sin(bird.stateTimer*0.015)*(1-t)*0.3;
    bird.x += bird.speed*speedMult*(dt/16);
    bird.phase += dt*0.006;
    bird.bobTime += dt*0.002;
    if (t>=1) { bird.state=S_FLY; bird.stateTimer=0; bird.drunkWobble=0; bird.drunkAngle=0; }
    if (bird.x > canvas.width+200) { step(1); resetBird(); }
  }

  const bob = (bird.state===S_LOOP) ? 0 : Math.sin(bird.bobTime*Math.PI*2)*5;
  const bx = bird.x, by = bird.y+bob;

  // glow (only when not drunk/looping)
  if (bird.drunkWobble <= 0.1 && bird.state !== S_LOOP) {
    const grd = ctx.createRadialGradient(bx,by,5,bx,by,80);
    grd.addColorStop(0,'rgba(0,180,220,0.12)'); grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.ellipse(bx,by,80,50,0,0,Math.PI*2); ctx.fill();
  }

  // loop trail


  if (bird.glass.visible) drawBeerGlass(bird.glass.x, bird.glass.y, Math.max(0.05,bird.glass.fill), bird.glass.rot);
  updateSplash(dt);
  updateDrunkStars(dt);

  // loop: rotate bird around the circle tangent
  let birdDrawX = bx, birdDrawY = by;
  let loopRot = 0;
  if (bird.state===S_LOOP) {
    birdDrawX = bird.x; birdDrawY = bird.y;
    loopRot = bird.loopAngle + Math.PI/2; // tangent to circle
  }

  ctx.save();
  if (bird.state===S_LOOP) {
    ctx.translate(birdDrawX, birdDrawY);
    ctx.rotate(loopRot);
    ctx.translate(-birdDrawX, -birdDrawY);
  }
  drawBird(birdDrawX, birdDrawY, bird.phase, bird.drinkTilt, bird.drunkAngle, bird.drunkWobble, colorful);
  ctx.restore();

  // Speech bubble when drunk
  if (bird.state === S_DRUNK) {
    const hiccupTexts = ['Trink!','Brüderchen!','Trink! 🍺','*hicks*','Prost!! 🍺🍺'];
    const idx = Math.floor(bird.stateTimer/400) % hiccupTexts.length;
    const bx2 = birdDrawX, by2 = birdDrawY;
    ctx.save();
    const bfs = Math.max(13, Math.min(18, canvas.width/22)); ctx.font = 'bold '+bfs+'px sans-serif';
    const txt = hiccupTexts[idx];
    const tw = ctx.measureText(txt).width;
    const bx3 = bx2+20, by3 = by2-55;
    // bubble
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.strokeStyle='rgba(0,0,0,0.3)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.roundRect(bx3-8, by3-22, tw+16, 30, 10);
    ctx.fill(); ctx.stroke();
    // tail
    ctx.beginPath();
    ctx.moveTo(bx3+5, by3+8); ctx.lineTo(bx2+30, by2-30); ctx.lineTo(bx3+20, by3+8);
    ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.fill();
    // text
    ctx.fillStyle='#c1440e';
    ctx.fillText(txt, bx3, by3-2);
    ctx.restore();
  }

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
